name: Build and deploy Python app to Azure Web App - jefamaquinista-backend-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: Django_MA2

      - name: Run migrations
        run: python manage.py migrate
        working-directory: Django_MA2
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Collect static files
        run: python manage.py collectstatic --noinput
        working-directory: Django_MA2

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r --exclude "env/*" --exclude "*.pyc" --exclude "__pycache__/*" --exclude ".git/*"
        working-directory: Django_MA2

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: Django_MA2/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'jefamaquinista-backend-dev'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
