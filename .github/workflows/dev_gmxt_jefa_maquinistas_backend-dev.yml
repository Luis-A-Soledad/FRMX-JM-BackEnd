# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - jefamaquinista-backend-dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: Django_MA2

      - name: Run migrations
        run: python manage.py migrate
        working-directory: Django_MA2
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "True"
          DJANGO_SETTINGS_MODULE: core.settings
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_ADMIN_KEY: ${{ secrets.AZURE_SEARCH_ADMIN_KEY }}
          DATABRICKS_SQL_HOST: ${{ secrets.DATABRICKS_SQL_HOST }}

      - name: Collect static files
        run: python manage.py collectstatic --noinput
        working-directory: Django_MA2
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "True"
          DJANGO_SETTINGS_MODULE: core.settings
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_INDEX: ${{ secrets.AZURE_SEARCH_INDEX }}
          AZURE_SEARCH_ADMIN_KEY: ${{ secrets.AZURE_SEARCH_ADMIN_KEY }}
          RETRIEVAL_BACKEND: azure-search
          DATABRICKS_SQL_HOST: ${{ secrets.DATABRICKS_SQL_HOST }}
          AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT: "text-embedding-3-small"
          AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
          AZURE_OPENAI_DEPLOYMENT: "o4-mini"
          DATABRICKS_ENDPOINT_URL: ${{ secrets.DATABRICKS_ENDPOINT_URL }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          GENIE_SPACE_ID: ${{ secrets.GENIE_SPACE_ID }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          ENTRA_SSO_ENFORCE: "1"
          SSO_ROLE_BYPASS_ENABLED: "1"
          SSO_ROLE_BYPASS_HEADER: "X-Bypass-Role"
          SSO_ROLE_BYPASS_MAP: "Angelica.Perez1@mx.ey.com:JEFE_MAQUINISTAS"
          RAG_BASE_TOP: "3"
          RAG_WIN_CHUNKS: "2"
          RAG_WIN_PAGES: "1"
          RAG_TOP_RETURN: "12"
          RAG_CTX_TOKEN_BUDGET: "2200"
          RAG_CTX_CHAR_BUDGET: "11000"
          RAG_TRIM_CHUNK_CHARS: "1600"
          DEFAULT_ZONE: "UTC"
          GENIE_TIMEOUT_SECONDS: "60"
          OUTPUT_DIR: "output"
          ENTRA_AUTH_ENABLED: "1"
          ENTRA_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ENTRA_AUDIENCE: ${{ secrets.AZURE_AUDIENCE }}
          ENTRA_DISCOVERY_URL: ${{ secrets.ENTRA_DISCOVERY_URL }}
          ENTRA_FRONTEND_CLIENT_ID: ${{ secrets.AZURE_FRONTEND_CLIENT_ID }}
          ENTRA_FRONTEND_CLIENT_SECRET: ${{ secrets.AZURE_FRONTEND_CLIENT_SECRET }}
          ENTRA_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
          ENTRA_SSO_SCOPES: ${{ secrets.AZURE_SSO_SCOPES }}
          ENTRA_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}
          ENTRA_EXPECTED_AUDIENCE: ${{ secrets.AZURE_EXPECTED_AUDIENCE }}
          ENTRA_REQUIRED_SCOPE: "Api.access"
          EMAIL_ALERTS_TABLE: "db_jefamaquinista_dev_01_7405609941721101.alertas.email_alerts_operational"
          EMAIL_ALERTS_REQUEST_TIMEOUT_SECS: "60"
          DATABRICKS_AZURE_AD_SCOPE: ${{ secrets.DATABRICKS_AZURE_AD_SCOPE }}


      - name: Zip artifact for deployment
        run: zip release.zip ./* -r --exclude "env/*" --exclude "*.pyc" --exclude "__pycache__/*" --exclude ".git/*"
        working-directory: Django_MA2

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            Django_MA2/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'jefamaquinista-backend-dev'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
